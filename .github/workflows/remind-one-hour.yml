name: remind-one-hour

on:
  schedule:
    - cron: "*/15 * * * *" # 15분마다 확인, 목표 시각 1시간 전을 지난 발표만 알림
  issues:
    types: [opened, edited] # 등록/수정 직후 목표시각이 이미 1시간 이내로 임박했으면 폴링을 안 기다리고 바로 잡음
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml requests
      - run: python scripts/remind_one_hour.py
      - name: Commit reminded state
        run: |
          git config user.name "gibuseu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/reminded_one_hour.json || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: 1시간전알림 상태 갱신"
            for i in 1 2 3 4 5; do
              git push && break
              git fetch origin
              git rebase origin/master
              sleep $((RANDOM % 4 + 1))
            done
          fi
