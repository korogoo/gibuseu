name: validate-presentation

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, '발표')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";

            // Issue Form 본문은 "### 필드명\n\n답변\n\n### 다음필드..." 형태로 렌더링된다.
            const sections = {};
            for (const chunk of body.split(/\n(?=### )/)) {
              const match = chunk.match(/^### (.+)\n([\s\S]*)$/);
              if (!match) continue;
              sections[match[1].trim()] = match[2].trim();
            }
            const isNoResponse = (v) => !v || v === "_No response_";

            const errors = [];

            const date = sections["발표일"] || "";
            if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
              errors.push(`발표일 형식이 YYYY-MM-DD가 아닙니다: "${date}"`);
            }

            const subcategory = sections["소분류"] || "";
            const subOther = sections["소분류 - 직접 입력"] || "";
            if (subcategory === "기타" && isNoResponse(subOther)) {
              errors.push("소분류를 '기타'로 골랐는데 '소분류 - 직접 입력'이 비어있습니다.");
            }

            const criteria = sections["학습 완료기준"] || "";
            const bulletLines = criteria
              .split("\n")
              .map((l) => l.trim())
              .filter((l) => l.startsWith("-"));
            if (bulletLines.length < 2) {
              errors.push("학습 완료기준은 '-'로 시작하는 줄이 최소 2개 이상이어야 합니다.");
            }

            const NEEDS_FIX_LABEL = "형식 확인 필요";
            const issue = context.payload.issue;
            const hasFixLabel = issue.labels.some((l) => l.name === NEEDS_FIX_LABEL);

            if (errors.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "다음 항목을 확인해주세요:\n\n" + errors.map((e) => `- ${e}`).join("\n"),
              });
              if (!hasFixLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [NEEDS_FIX_LABEL],
                });
              }
            } else if (hasFixLabel) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: NEEDS_FIX_LABEL,
              });
            }

            const team = sections["조"] || "";
            if (team && !issue.labels.some((l) => l.name === team)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [team],
              });
            }
