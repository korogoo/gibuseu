name: assign-teams

on:
  schedule:
    - cron: "0 0 * * *" # 매일 09:00 KST에 확인 — 실제 배정은 3일 주기일 때만 일어남
  workflow_dispatch:
    inputs:
      force:
        description: "3일 주기 무시하고 강제 재배정"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - run: python scripts/assign_teams.py ${{ inputs.force && '--force' || '' }} | tee team_result.txt

      - name: Commit result
        id: commit
        run: |
          git config user.name "gibuseu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add teams/history.yaml
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: 팀 배정 결과 갱신"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord
        if: steps.commit.outputs.changed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONTENT=$(jq -Rs '.' team_result.txt)
          curl -sf -X POST -H "Content-Type: application/json" \
            -d "{\"content\": $CONTENT}" \
            "$DISCORD_WEBHOOK_URL"
