name: assign-teams

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - run: python scripts/assign_teams.py | tee team_result.txt

      - name: Commit result
        run: |
          git config user.name "gibuseu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add teams/history.yaml
          git diff --cached --quiet && echo "no changes" || git commit -m "chore: 팀 배정 결과 갱신"
          git push

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONTENT=$(jq -Rs '.' team_result.txt)
          curl -sf -X POST -H "Content-Type: application/json" \
            -d "{\"content\": $CONTENT}" \
            "$DISCORD_WEBHOOK_URL"
