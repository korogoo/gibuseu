name: assign-teams

on:
  schedule:
    - cron: "0 0 * * *" # 매일 09:00 KST에 확인 — 실제 배정은 다음 회차의 D-1에만 일어남
  workflow_dispatch:
    inputs:
      force:
        description: "D-1 여부 무시하고 강제 재배정"
        type: boolean
        default: false
      date:
        description: "회차 날짜 직접 지정 (YYYY-MM-DD, 비우면 자동 계산). 주기가 안 맞는 예외적인 회차에 사용"
        type: string
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml requests openai

      - run: |
          set -o pipefail
          python scripts/assign_teams.py \
            ${{ inputs.force && '--force' || '' }} \
            ${{ inputs.date && format('--date {0}', inputs.date) || '' }} \
            | tee team_result.txt

      - name: Commit result
        id: commit
        run: |
          git config user.name "gibuseu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add teams/history.yaml
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: 팀 배정 결과 갱신"
            for i in 1 2 3 4 5; do
              git push && break
              git fetch origin
              git rebase origin/master
              sleep $((RANDOM % 4 + 1))
            done
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord
        if: steps.commit.outputs.changed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONTENT=$(jq -Rs '.' team_result.txt)
          curl -sf -X POST -H "Content-Type: application/json" \
            -d "{\"content\": $CONTENT, \"username\": \"기부스지키미👀\"}" \
            "$DISCORD_WEBHOOK_URL"
