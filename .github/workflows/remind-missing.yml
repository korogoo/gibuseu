name: remind-missing

on:
  schedule:
    - cron: "0 0 * * *"  # 09:00 KST — 발표 전날에만 실제로 알림 나감(스크립트가 판단)
    - cron: "0 12 * * *" # 21:00 KST
  workflow_dispatch: {}

permissions:
  issues: read

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml requests
      - run: python scripts/remind_missing.py
